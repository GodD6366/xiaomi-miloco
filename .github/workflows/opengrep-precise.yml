# OpenGrep PR 差分扫描：只扫 PR 改动的第一方源码，发现新问题即阻塞，并上传 SARIF。
# 全量扫描见 opengrep-precise-full.yml（手动触发）。
name: OpenGrep — PR Diff

on:
  pull_request:
    paths:
      - "backend/**"
      - "cli/**"
      - "plugins/openclaw/src/**"
      - "web/src/**"
      - "scripts/**"
      - ".ci/opengrep-rules.yml"
      - ".ci/run-opengrep.sh"
      - ".semgrepignore"
      - ".github/workflows/opengrep-precise*.yml"

concurrency:
  group: opengrep-pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Scan changed paths
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0 # 需要 base commit 做 diff

      - name: 安装 opengrep
        env:
          # 官方 install.sh 即便指定了 -v 也会调 api.github.com 校验版本，匿名 API 在共享
          # runner 上频繁触发 60 次/时 限流 → "Failed to fetch available versions"。
          # 改为直接从 releases/download 拉二进制（不经 api.github.com），并以 sha256 固定，
          # 比原先"无 cosign 时跳过签名校验"更强。升级时 VERSION 与 SHA256 一起 bump。
          OPENGREP_VERSION: v1.22.0
          # opengrep_manylinux_x86 (ubuntu-latest x86_64) 的 sha256
          OPENGREP_SHA256: 45bcd58440e397ed52c50e953ccf5948909ea77087c9186fc7d277216f62e319
        run: |
          dest="$HOME/.opengrep/cli/${OPENGREP_VERSION}"
          mkdir -p "$dest"
          curl -fsSL --retry 5 --retry-delay 5 --retry-connrefused \
            -o "$dest/opengrep" \
            "https://github.com/opengrep/opengrep/releases/download/${OPENGREP_VERSION}/opengrep_manylinux_x86"
          echo "${OPENGREP_SHA256}  $dest/opengrep" | sha256sum -c -
          chmod +x "$dest/opengrep"
          ln -sfn "$dest" "$HOME/.opengrep/cli/latest"
          echo "$HOME/.opengrep/cli/latest" >> "$GITHUB_PATH"

      - run: opengrep --version

      - name: 扫描 PR diff
        env:
          MILOCO_OPENGREP_BASE_REF: ${{ github.event.pull_request.base.sha }}...HEAD
        run: |
          mkdir -p .opengrep-out
          bash .ci/run-opengrep.sh --changed --sarif --error

      - name: 上传 SARIF 到 Code Scanning
        if: always() && hashFiles('.opengrep-out/precise.sarif') != ''
        continue-on-error: true # 未开 Code Scanning 时上传会失败；扫描结论由前一步 --error 决定，上传不阻塞
        uses: github/codeql-action/upload-sarif@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          sarif_file: .opengrep-out/precise.sarif
          category: opengrep-pr-diff
